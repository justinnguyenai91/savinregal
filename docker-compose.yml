services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: savinregal
      POSTGRES_USER: savinregal
      POSTGRES_PASSWORD: ${DB_PASSWORD:-savinregal_secret_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U savinregal"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ${DOCKER_IMAGE:-tuantranhub/savin-regal:latest}
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://savinregal:${DB_PASSWORD:-savinregal_secret_2026}@db:5432/savinregal
      AUTH_SECRET: ${AUTH_SECRET:-savin-regal-production-secret-key}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
